<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Certificado</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #eee;
      margin: 0;
      padding: 0;
    }

    .formulario {
      margin: 20px;
      padding: 10px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 90%;
      max-width: 500px;
      margin: 0 auto 10px auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 90%;
      max-width: 300px;
      background-color: #4CAF50;
      color: white;
      border: none;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #preview {
      display: none;
    }

    #btnImprimir {
      display: none;
    }

    /* ===== CERTIFICADO ===== */
    .container {
      position: relative;
      width: 100%;
      max-width: 1123px;
      aspect-ratio: 1123 / 794;
      margin: 0 auto;
    }

    .certificado {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nome-dinamico {
      position: absolute;
      top: 41%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 3vw, 40px);
      font-family: 'Fraunces', serif;
      font-weight: 700;
      color: #000;
      width: 80%;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      word-break: break-word;
    }

    /* MOBILE */
    @media screen and (max-width: 768px) {
      .container {
        width: 95vw;
        transform: scale(0.95);
        transform-origin: top center;
      }

      body {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="formulario">
    <h2>Gerador de Certificado</h2>

    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite o nome completo" />

    <button onclick="gerar()">Gerar Certificado</button>
    <button id="btnImprimir" onclick="gerarPNG()">Baixar Certificado (PNG)</button>
  </div>

  <div id="preview">
    <div class="container">
      <img src="certificado_base.jpeg" class="certificado" alt="Certificado" />
      <div class="nome-dinamico" id="nome-certificado">SEU NOME AQUI</div>
    </div>
  </div>

  <script>
    function gerar() {
      let nome = document.getElementById('nome').value.trim();

      if (nome === '') {
        alert('Por favor, insira um nome.');
        return;
      }

      document.getElementById('nome-certificado').innerText = nome.toUpperCase();

      document.getElementById('preview').style.display = 'block';
      document.getElementById('btnImprimir').style.display = 'inline-block';
    }

    async function gerarPNG() {
      const elemento = document.querySelector("#preview");

      if (!elemento) return;

      await new Promise(resolve => setTimeout(resolve, 300));

      const canvas = await html2canvas(elemento, {
        scale: 3,
        useCORS: true,
        backgroundColor: null
      });

      const imgData = canvas.toDataURL("image/png");

      const link = document.createElement("a");
      link.href = imgData;
      link.download = "certificado.png";
      link.click();
    }
  </script>

</body>
</html>
